# ----------------------------------------------------- 
# Rclone Configuration Template
# Remote: google-drive
# ----------------------------------------------------- 

[google-drive]
type = drive
scope = drive
# It is highly recommended to use your own Client ID and Secret
# See: https://rclone.org/drive/#making-your-own-client-id
client_id = YOUR_CLIENT_ID
client_secret = YOUR_CLIENT_SECRET
token = {"access_token":"YOUR_ACCESS_TOKEN","token_type":"Bearer","refresh_token":"YOUR_REFRESH_TOKEN","expiry":"2026-05-10T00:00:00.0000000-00:00"}
team_drive = 
root_folder_id = 

# ----------------------------------------------------- 
# Rclone Performance Settings
# ----------------------------------------------------- 
# Use --vfs-cache-mode full for better compatibility with Dolphin/Apps
# Use --drive-chunk-size 128M for faster uploads
