# ----------------------------------------------------- 
# Custom Configuration for ML4W Hyprland
# Utmost Perfection / Monochrome / AI-Managed
# ----------------------------------------------------- 

# --- Keybindings ---
# Ctrl + Shift + Enter -> Open Browser
bind = CTRL SHIFT, Return, exec, xdg-open "https://google.com"

# Ctrl + Shift + A -> Alacritty into AI Agent session
bind = CTRL SHIFT, A, exec, alacritty -e ~/dotfiles/scripts/ai-agent.sh

# Ctrl + Shift + I -> Alacritty into Manual Nix shell
bind = CTRL SHIFT, I, exec, alacritty -e ~/dotfiles/scripts/nix-shell.sh

# --- Visual Theme (Strict Monochrome) ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    # Strictly White to Dark Gray gradient
    col.active_border = rgba(ffffffff) rgba(444444ff) 45deg
    col.inactive_border = rgba(111111ff)
    
    layout = dwindle
}

decoration {
    rounding = 8
    
    # Monochrome Blur
    blur {
        enabled = true
        size = 3
        passes = 2
        new_optimizations = true
        brightness = 1.0
        contrast = 1.0
        vibrancy = 0.0 # Remove all color saturation
    }
    
    # Strict Black Shadow
    drop_shadow = true
    shadow_range = 15
    shadow_render_power = 3
    col.shadow = rgba(000000ee)
}

# --- Animations (Sharp & Fast) ---
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    # Ultra-fast animations (5ms feel)
    animation = windows, 1, 2, myBezier
    animation = windowsOut, 1, 2, default, popin 80%
    animation = border, 1, 2, default
    animation = fade, 1, 2, default
    animation = workspaces, 1, 2, default
}

# --- Window Rules (Monochrome Enforcement) ---
# Ensure no windows bring unwanted colors to borders
windowrulev2 = bordercolor rgba(ffffffff) rgba(444444ff) 45deg,pinned:1
windowrulev2 = bordercolor rgba(888888ff),floating:1
